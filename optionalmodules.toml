[[modules]]
name = "TestAssets"
path = "/tmp/lion_test_assets"
state = 1

[[modules]]
name = "LogData"
path = "/tmp/lion-logs"
state = 0

[[modules]]
name = "X11"
state = 1
mounts = [
    { src = "/tmp/.X11-unix", dst = "/tmp/.X11-unix", mode = "rw" },
    { src = "${XAUTHORITY}", dst = "${XAUTHORITY}", mode = "ro" },
    { src = "${HOME}/.Xauthority", dst = "${HOME}/.Xauthority", mode = "ro" }
]
env = ["DISPLAY", "XAUTHORITY"]

[[modules]]
name = "Wayland"
state = 1
mounts = [
    { src = "${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}", dst = "${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}", mode = "rw" }
]
env = ["WAYLAND_DISPLAY", "XDG_RUNTIME_DIR"]

[[modules]]
name = "GPU"
state = 1
mounts = [
    { src = "/dev/dri", dst = "/dev/dri", mode = "dev" },
    { src = "/sys", dst = "/sys", mode = "ro" },
    { src = "/dev/shm", dst = "/dev/shm", mode = "rw" }
]

[[modules]]
name = "Fonts"
state = 1
mounts = [
    { src = "/usr/share/fonts", dst = "/usr/share/fonts", mode = "ro" }
]

[[modules]]
name = "D-Bus"
state = 1
mounts = [
    { src = "${XDG_RUNTIME_DIR}/bus", dst = "${XDG_RUNTIME_DIR}/bus", mode = "rw" },
    { src = "${XDG_RUNTIME_DIR}/at-spi/bus", dst = "${XDG_RUNTIME_DIR}/at-spi/bus", mode = "rw" }
]
